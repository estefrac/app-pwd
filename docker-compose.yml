services:
  backend:
    build: backend
    container_name: flask_api
    depends_on:
      - db
    env_file:
      - ./.env
    ports:
      - 5001:5000
    volumes:
      - ./backend:/app
    networks:
      - pwd_network

  db:
    image: postgres:15
    container_name: postgres15
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pwd_network

volumes:
  pgdata:

networks:
  pwd_network:
    driver: bridge
